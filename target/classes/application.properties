# ╔══════════════════════════════════════════════════════════════╗
# ║  ARQUIVO: application.properties                             ║
# ║                                                              ║
# ║  Este arquivo configura o comportamento do Spring Boot.      ║
# ║  É como as "configurações" do servidor.                      ║
# ╚══════════════════════════════════════════════════════════════╝

# Porta onde o servidor vai rodar
# Padrão é 8080, mas pode mudar se necessário
server.port=8080

# Nome da aplicação (aparece nos logs)
spring.application.name=cha-casa-nova

# Configuração para aceitar JSON com encoding UTF-8 (caracteres especiais do português)
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true

# Configuração para servir arquivos estáticos (HTML, CSS, JS)
# O Spring Boot serve automaticamente tudo que estiver em src/main/resources/static/
spring.web.resources.static-locations=classpath:/static/

# Logs menos verbosos (mais limpo no console)
logging.level.root=WARN
logging.level.com.chacasanova=INFO
